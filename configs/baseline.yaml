project:
  name: baseline
  seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_file: TBD          # e.g. titanic/train.csv
  test_file: TBD           # e.g. titanic/test.csv
  sample_submission_file: TBD
  target: TBD              # e.g. Survived
  id_column: TBD           # e.g. PassengerId

validation:
  strategy: stratified_kfold  # stratified_kfold | kfold
  n_splits: 5
  metric: accuracy            # sklearn scoring string

model:
  name: random_forest
  params: {}

output:
  dir: outputs

mlflow:
  experiment_name: ${project.name}
  tracking_uri: sqlite:///mlruns.db
  run_name: baseline

